<header id="header" class="header" data-dev="Header Section">
  <div class="container">
    <div class="header__inner">
      <!-- Desktop Logo -->
      <a href="./index.html" class="header__logo logo-link">
        <img
          src="./img/logo.svg"
          alt=""
          class="nav-logo"
          width="45"
          height="36"
          decoding="async"
        />
        <span class="logo-text">Cinemania</span>
      </a>

      <!-- Desktop Navigation -->
      <nav class="header__nav desktop-nav">
        <a href="./index.html" class="nav-link" data-page="home">HOME</a>
        <a href="./catalog.html" class="nav-link" data-page="catalog">CATALOG</a>
        <a href="./library.html" class="nav-link" data-page="library">MY LIBRARY</a>
      </nav>

      <!-- Mobile Navigation -->
      <nav class="mobile-nav">
        <div class="mobile-menu-logo">
          <a href="./index.html" class="logo-link">
            <img
              src="./img/logo.svg"
              alt=""
              class="nav-logo"
              width="45"
              height="36"
              decoding="async"
            />
            <span class="logo-text">Cinemania</span>
          </a>
        </div>
        <a href="./index.html" class="nav-link" data-page="home">HOME</a>
        <a href="./catalog.html" class="nav-link" data-page="catalog">CATALOG</a>
        <a href="./library.html" class="nav-link" data-page="library">MY LIBRARY</a>
      </nav>

      <!-- Menu Toggle Button -->
      <button type="button" class="header__menu-btn" id="menuToggle" aria-expanded="false">
        MENU
      </button>

      <!-- Theme Controls -->
      <div class="header__controls">
        <button type="button" class="theme-toggle" aria-label="Toggle theme">
          <span class="toggle-track">
            <img
              src="./img/moon.svg"
              class="icon moon"
              alt="moon icon"
              width="14"
              height="14"
              decoding="async"
            />
            <img
              src="./img/sun.svg"
              class="icon sun"
              alt="sun icon"
              width="14"
              height="14"
              decoding="async"
            />
            <span class="toggle-thumb"></span>
          </span>
        </button>
      </div>
    </div>
  </div>
</header>
