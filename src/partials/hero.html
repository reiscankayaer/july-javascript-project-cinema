<section class="hero" id="hero" aria-label="Featured Movie">
  <!-- JavaScript ile arka plan resmi eklenecek alan -->
  <div class="hero__bg" id="heroBg"></div>
  <div class="hero__overlay"></div>
  
  <div class="container hero__container">
    <div class="hero__content">
      <!-- API'den veri gelene kadar görünecek varsayılan metinler -->
      <h1 class="hero__title" id="heroTitle">Cinemania</h1>
      
      <div class="hero__meta" id="heroMeta"></div>
      
      <p class="hero__overview" id="heroOverview">
        Discover the most popular, top rated and latest movies. Explore our catalog and find your next favorite film.
      </p>
      
      <div class="hero__actions">
        <button class="btn btn--primary" id="heroTrailerBtn" type="button">
          Watch Trailer
        </button>
        <button class="btn btn--secondary" id="heroDetailsBtn" type="button">
          More Details
        </button>
      </div>
    </div>
  </div>
</section>
