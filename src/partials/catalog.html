<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/reset.css" />
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/catalog.css" />
    <title>Cinemania - Catalog</title>
  </head>
  <body>
    <main>
      <section class="catalog">
        <div class="container">
          <div class="catalog__wrapper">
            <form class="search-form" id="searchForm" autocomplete="off">
              <!-- Arama Input Alanı -->
              <div class="search-form__box search-form__box--input">
                <input
                  type="text"
                  class="search-form__input"
                  id="searchInput"
                  placeholder="Search movies..."
                  aria-label="Search movies"
                />
                <button
                  class="search-form__clear-btn"
                  type="button"
                  id="clearBtn"
                  aria-label="Clear search"
                >
                  ✕
                </button>
              </div>

              <!-- Yıl Seçim Çarkı -->
              <div
                class="search-form__box search-form__box--year"
                id="yearSelectWrapper"
              >
                <div id="yearSelectCustom" class="custom-select">
                  <button
                    type="button"
                    class="custom-select__trigger"
                    aria-expanded="false"
                  >
                    <span class="custom-select__label">Year</span>
                    <svg
                      class="custom-select__arrow"
                      width="14"
                      height="14"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                    >
                      <polyline points="6 9 12 15 18 9"></polyline>
                    </svg>
                  </button>
                  <ul class="custom-select__options hide" id="yearMenu">
                    <!-- JavaScript dinamik dolduracak -->
                  </ul>
                </div>
              </div>

              <!-- Gönder Butonu -->
              <button
                type="submit"
                class="search-form__submit-btn"
                aria-label="Submit Search"
              >
                <svg
                  width="20"
                  height="20"
                  viewBox="0 0 32 32"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <circle cx="14" cy="14" r="10"></circle>
                  <line x1="28" y1="28" x2="22" y2="22"></line>
                </svg>
              </button>
            </form>
          </div>

          <div class="catalog-movies-list"></div>
        </div>
      </section>
    </main>

    <script type="module" src="../js/catalog.js"></script>
  </body>
</html>
